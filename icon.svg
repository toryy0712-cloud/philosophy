<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!-- 배경 (앱의 다크 테마와 동일한 색상) -->
    <rect width="512" height="512" rx="115" fill="#121212" />
    
    <!-- 펼쳐진 책 / 지혜의 문을 형상화한 라인 (메인 컬러: 퍼플) -->
    <path d="M160 360 V180 C160 150 200 130 256 130 C312 130 352 150 352 180 V360" fill="none" stroke="#bb86fc" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- 중심을 관통하는 사유의 축 -->
    <path d="M256 130 V380" fill="none" stroke="#bb86fc" stroke-width="32" stroke-linecap="round" />
    
    <!-- 하단의 펼쳐진 페이지 라인 -->
    <path d="M120 360 C180 360 230 380 256 400 C282 380 332 360 392 360" fill="none" stroke="#bb86fc" stroke-width="24" stroke-linecap="round"/>

    <!-- 번뜩이는 통찰을 상징하는 새벽별 (서브 컬러: 틸) -->
    <circle cx="256" cy="90" r="18" fill="#03dac6" />
</svg>
