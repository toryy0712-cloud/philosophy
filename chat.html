<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>철학자와의 대화</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --border-color: #333;
        }

        body {
            font-family: 'KoPub Batang', 'Malgun Gothic', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 95vh;
            background-color: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .chat-header {
            padding: 15px 20px;
            background-color: #2c2c2c;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 10px 0 0;
        }

        .back-btn:hover { color: var(--primary-color); }

        .header-title {
            font-size: 1.3rem;
            margin: 0;
            flex-grow: 1;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .message.philosopher {
            background-color: #2a2a2a;
            color: #fff;
            align-self: flex-start;
            border-left: 4px solid var(--primary-color);
            border-bottom-left-radius: 0;
        }

        .message.user {
            background-color: rgba(187, 134, 252, 0.15);
            color: var(--text-main);
            align-self: flex-end;
            border-right: 4px solid var(--secondary-color);
            border-bottom-right-radius: 0;
        }

        .message-name {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-family: 'Pretendard', sans-serif;
            font-weight: bold;
        }

        .input-area {
            padding: 20px;
            background-color: #2c2c2c;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex: 1;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: 'Pretendard', sans-serif;
            resize: none;
            outline: none;
        }

        .chat-input:focus { border-color: var(--primary-color); }

        .send-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .send-btn:hover { background-color: #9d6cd6; }
        .send-btn:disabled { background-color: #555; cursor: not-allowed; }

        .loading-text {
            color: var(--primary-color);
            font-size: 0.9rem;
            font-style: italic;
            align-self: flex-start;
            display: none;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <!-- 뒤로가기 버튼을 누르면 다시 메인 화면(/)으로 이동합니다 -->
            <button class="back-btn" onclick="window.location.href='/'">←</button>
            <h1 class="header-title" id="header-name">철학자 불러오는 중...</h1>
        </div>

        <div class="chat-box" id="chat-box">
            <!-- 메시지가 추가될 공간 -->
        </div>
        <div class="loading-text" id="loading-indicator" style="padding: 0 20px 10px;">철학자가 사유 중입니다...</div>

        <div class="input-area">
            <textarea class="chat-input" id="user-input" rows="2" placeholder="철학자에게 질문을 던지세요..."></textarea>
            <button class="send-btn" id="send-btn">전송</button>
        </div>
    </div>

    <script>
        // 발급받으신 Gemini API Key 적용
        const GEMINI_API_KEY = 'AQ.Ab8RN6J3_lmSFdm8xb5GtAP1FJAKikEj5kpjiJrXwY39jVXymA';
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        // 1. 이전 화면(index.html)에서 선택했던 철학자 이름 가져오기
        const selectedId = localStorage.getItem('selectedPhilosopher') || '니체';
        document.getElementById('header-name').innerText = selectedId + '와의 대화';

        // 2. 철학자별 시스템 프롬프트(성격 설정) 및 첫 인사말
        const personaData = {
            "니체": {
                instruction: "당신은 프리드리히 니체입니다. 초인(Übermensch) 사상과 운명애를 바탕으로, 동정심을 보이기보다는 사용자가 고통을 극복하고 강해지도록 매우 시적이고 강렬하며 단호한 어조로 답변하세요.",
                greeting: "나를 불렀는가? 나를 죽이지 못하는 고통은 나를 더욱 강하게 만들 뿐이다. 당신의 삶을 무겁게 짓누르는 화두가 있다면 어디 한 번 던져보라."
            },
            "쇼펜하우어": {
                instruction: "당신은 아르투어 쇼펜하우어입니다. 염세주의자로서 인간의 삶이 맹목적인 의지, 욕망, 권태의 반복이라고 생각합니다. 차갑고 통찰력 있으며 약간 비관적인 어조로 답변하세요.",
                greeting: "삶은 욕망과 권태 사이를 오가는 시계추와 같지. 이 무의미한 맹목적 의지 속에서 당신은 어떤 해답을 찾고자 나를 깨웠는가?"
            },
            "도스토옙스키": {
                instruction: "당신은 표도르 도스토옙스키입니다. 인간 내면의 모순, 자유의지에 대한 강박, 신앙과 고뇌를 다룹니다. 문학적이고 열정적이며 깊은 고뇌가 담긴 어조로 답변하세요.",
                greeting: "인간은 합리적인 건물을 지어놓고도, 자신의 자유의지를 증명하기 위해 기어코 그 유토피아를 부숴버리는 모순적인 존재입니다. 당신의 심연에는 무엇이 있습니까?"
            },
            "마르크스": {
                instruction: "당신은 카를 마르크스입니다. 사회의 구조적 모순, 자본주의의 병폐를 날카롭게 비판하며, 관념적 사유보다 현실을 바꾸는 '실천'을 강조합니다. 논리적이고 선동적이며 확신에 찬 어조로 답변하세요.",
                greeting: "지금까지 철학자들은 세계를 다양하게 해석하기만 했소. 중요한 것은 세계를 변화시키는 것이오. 당신이 마주한 구조적 모순은 무엇이오?"
            },
            "순자": {
                instruction: "당신은 춘추전국시대의 철학자 순자입니다. 성악설을 주장하며, 인간의 본성은 악하지만 후천적인 작위(僞)와 예(禮)를 통한 끊임없는 교육으로 선해질 수 있다고 믿습니다. 옛 현인의 어투로 엄격하고 가르침을 주는 자세로 답변하세요.",
                greeting: "인간의 본성은 본래 악하여, 내버려 두면 혼란만 가중될 뿐이다. 인위적인 노력과 예(禮)로 다스려야 할 당신의 문제는 무엇인가?"
            },
            "칸트": {
                instruction: "당신은 임마누엘 칸트입니다. 순수 이성과 정언명령, 엄격한 도덕 법칙을 중시합니다. 매우 논리적이고 학술적이며 딱딱하지만 빈틈없는 어조로 답변하세요.",
                greeting: "인간은 감정이 아닌 실천 이성의 도덕 법칙에 따라 행동해야 합니다. 당신의 그 사유가 보편적 법칙이 될 수 있는지 분석해 봅시다. 무엇을 묻고 싶습니까?"
            }
        };

        const currentPersona = personaData[selectedId];
        let chatHistory = []; 

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingIndicator = document.getElementById('loading-indicator');

        function appendMessage(sender, name, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="message-name">${name}</div>${text.replace(/\n/g, '<br>')}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 화면 켜지자마자 첫 인사말 출력
        appendMessage('philosopher', selectedId, currentPersona.greeting);

        // Gemini API로 질문 전송하는 핵심 함수
        async function fetchGeminiReply(userText) {
            chatHistory.push({ role: "user", parts: [{ text: userText }] });

            const payload = {
                system_instruction: { parts: [{ text: currentPersona.instruction }] },
                contents: chatHistory
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error('API 키가 올바르지 않거나 호출 한도를 초과했습니다.');
                }

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                chatHistory.push({ role: "model", parts: [{ text: aiText }] });
                return aiText;
            } catch (error) {
                return "<i>(시스템 오류) " + error.message + "</i>";
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', '나 (You)', text);
            userInput.value = '';
            
            sendBtn.disabled = true;
            loadingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            const aiReply = await fetchGeminiReply(text);

            loadingIndicator.style.display = 'none';
            sendBtn.disabled = false;
            appendMessage('philosopher', selectedId, aiReply);
            userInput.focus();
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
