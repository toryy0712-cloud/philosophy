<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon192.png">
    <link rel="shortcut icon" href="/icon192.png">
    <link rel="apple-touch-icon" href="/icon192.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    
    <title>사유의 공간 - 철학자와의 대담</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --border-color: #333;
        }

        body {
            font-family: 'KoPub Batang', 'Malgun Gothic', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 800px) {
            .chat-container {
                height: 95vh;
                border-radius: 12px;
                border: 1px solid var(--border-color);
                box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            }
        }

        .chat-header {
            padding: 15px 20px;
            background-color: rgba(30, 30, 30, 0.95);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 10px 5px 0;
        }

        .header-title {
            font-size: 1.2rem;
            margin: 0;
            flex-grow: 1;
            letter-spacing: 1px;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        
        .message {
            max-width: 85%;
            padding: 18px 24px;
            border-radius: 14px;
            font-size: 1.05rem;
            line-height: 1.8;
            letter-spacing: -0.03em;
            word-break: keep-all;
            user-select: text; 
        }

        .message.philosopher {
            background-color: var(--surface-color);
            color: #ececec;
            align-self: flex-start;
            border-top-left-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .message.user {
            background-color: rgba(187, 134, 252, 0.12);
            color: var(--text-main);
            align-self: flex-end;
            border-top-right-radius: 2px;
        }

        .message.error {
            background-color: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border-left: 4px solid #e74c3c;
            font-size: 0.95rem;
            max-width: 90%;
        }

        .message-name {
            font-size: 0.85rem;
            color: var(--primary-color);
            margin-bottom: 8px;
            font-family: 'Pretendard', sans-serif;
            font-weight: 600;
            opacity: 0.8;
        }

        .input-area {
            padding: 15px 20px 25px;
            background-color: rgba(30, 30, 30, 0.95);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid #444;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-family: 'KoPub Batang', serif;
            resize: none;
            outline: none;
            line-height: 1.5;
            max-height: 120px;
            transition: border-color 0.3s;
        }

        .chat-input:focus { border-color: var(--primary-color); }

        .send-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: bold;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
            height: 52px;
        }

        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { background-color: #555; cursor: not-allowed; transform: none; }

        .loading-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            align-self: flex-start;
            margin: -10px 0 10px 20px;
            display: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <button class="back-btn" onclick="window.location.href='/'">←</button>
            <h1 class="header-title" id="header-name">사유의 공간</h1>
        </div>

        <div class="chat-box" id="chat-box"></div>
        <div class="loading-text" id="loading-indicator">사상가가 깊은 사유를 전개하고 있습니다...</div>

        <div class="input-area">
            <textarea class="chat-input" id="user-input" rows="1" placeholder="질문을 던지십시오..."></textarea>
            <button class="send-btn" id="send-btn">전송</button>
        </div>
    </div>

    <script>
        // -------------------------------------------------------------
        // [DeepSeek API 연동 설정 - deepseek-reasoner]
        // -------------------------------------------------------------
        const DEEPSEEK_API_KEY = 'sk-d8442a04bb634ba48014fa1f681af04b';
        const DEEPSEEK_API_URL = 'https://api.deepseek.com/chat/completions';
        const MODEL_NAME = 'deepseek-reasoner';

        const selectedId = localStorage.getItem('selectedPhilosopher') || '니체';
        document.getElementById('header-name').innerText = selectedId + '와의 대담';

        const personaData = {
            "니체": { 
                instruction: "당신은 프리드리히 니체입니다. '차라투스트라는 이렇게 말했다'의 어조를 빌려, 예언자적이고 시적이며 단호한 문체를 사용하십시오. 나약한 동정을 경멸하고, 초인과 운명애의 관점에서 질문자의 고뇌를 '극복해야 할 디딤돌'로 재해석하십시오. 오직 100% 자연스럽고 품격 있는 표준 한글 문장으로만 답변하십시오.", 
                greeting: "나를 불렀는가? 나를 죽이지 못하는 고통은 나를 더욱 강하게 만들 뿐이다. 당신의 삶을 무겁게 짓누르는 중력의 영들이 있다면 어디 한 번 던져보라." 
            },
            "쇼펜하우어": { 
                instruction: "당신은 아르투어 쇼펜하우어입니다. '의지와 표상으로서의 세계'에 입각하여, 세상의 본질을 맹목적인 의지로 봅니다. 인간의 삶은 욕망과 권태 사이를 오가는 시계추와 같다는 염세적 통찰을 바탕으로, 냉소적이고 날카로우며 건조한 어조로 답변하십시오. 오직 100% 자연스럽고 품격 있는 표준 한글 문장으로만 답변하십시오.", 
                greeting: "또 한 명의 맹목적인 의지가 나를 깨웠군. 삶은 욕망과 권태 사이를 오가는 시계추와 같고, 인간은 그 틈바구니에서 끊임없이 결핍을 호소하지. 무엇을 묻고자 하는가?" 
            },
            "도스토옙스키": { 
                instruction: "당신은 표도르 도스토옙스키입니다. 열정적이고 다소 신경증적이며 깊은 고뇌가 담긴 문체를 사용하십시오. 인간 영혼의 극단적인 모순, 자유의지가 가져오는 고통, 죄와 구원의 문제를 탐구합니다. 오직 100% 자연스럽고 품격 있는 표준 한글 문장으로만 답변하십시오.", 
                greeting: "인간은 참으로 모순적인 존재입니다. 합리적인 수정궁을 지어놓고도, 오직 자신의 자유의지를 증명하기 위해 그 완벽한 건물을 스스로 부숴버리지요. 당신의 심연에는 무엇이 있습니까?" 
            },
            "마르크스": { 
                instruction: "당신은 카를 마르크스입니다. 변증법적 유물론에 근거하여 논리적이고 선동적이며 분석적인 어조로 답변하십시오. 질문자의 개인적인 고민을 사회 구조적 모순과 자본의 소외 문제로 연결하여 해석하십시오. 오직 100% 자연스럽고 품격 있는 표준 한글 문장으로만 답변하십시오.", 
                greeting: "지금까지 철학자들은 단지 세계를 여러 가지로 해석하기만 했소. 그러나 중요한 것은 세계를 변화시키는 것이오. 현상의 이면을 함께 분석해 봅시다." 
            },
            "순자": { 
                instruction: "당신은 순자입니다. 인간의 본성은 악하며 오직 후천적인 인위적 노력과 예의를 통해서만 바르게 교화될 수 있다고 믿습니다. 논리가 정연하고 엄격한 스승의 어조를 사용하십시오. 오직 100% 자연스럽고 품격 있는 표준 한글 문장으로만 답변하십시오.", 
                greeting: "나무가 먹줄을 좇으면 곧아지고, 쇠가 숫돌에 갈리면 날카로워지는 법이다. 후천적인 작위와 예로 자신을 쳐서 복종시켜야 한다. 너를 어지럽히는 미혹됨은 무엇인가?" 
            },
            "칸트": { 
                instruction: "당신은 임마누엘 칸트입니다. 논리적 도약 없이 매우 체계적이고 학술적이며 건조한 어조로 답변하십시오. 정언명령을 기준으로 질문자의 사유를 해체하고 분석하십시오. 오직 100% 자연스럽고 품격 있는 표준 한글 문장으로만 답변하십시오.", 
                greeting: "인간은 실천 이성의 도덕 법칙에 따라 행동해야 하는 목적 그 자체로서의 존재입니다. 당신의 사유가 보편적 입법의 원리가 될 수 있는지 이성의 법정에서 분석해 봅시다." 
            }
        };

        const currentPersona = personaData[selectedId];
        
        let chatHistory = [
            { role: "system", content: currentPersona.instruction },
            { role: "assistant", content: currentPersona.greeting }
        ];

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingIndicator = document.getElementById('loading-indicator');

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            let newHeight = this.scrollHeight;
            if (newHeight > 120) newHeight = 120;
            this.style.height = newHeight + 'px';
        });

        function appendMessage(sender, name, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="message-name">${name}</div>${text.replace(/\n/g, '<br>')}`;
            chatBox.appendChild(div);
            
            setTimeout(() => {
                chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        appendMessage('philosopher', selectedId, currentPersona.greeting);

        async function fetchDeepSeekReply(userText) {
            chatHistory.push({ role: "user", content: userText });

            const MAX_HISTORY = 10;
            if (chatHistory.length > MAX_HISTORY + 1) {
                chatHistory = [
                    chatHistory[0],
                    ...chatHistory.slice(chatHistory.length - MAX_HISTORY)
                ];
            }

            try {
                const response = await fetch(DEEPSEEK_API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: chatHistory,
                        max_tokens: 2048
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP 상태 코드: ${response.status}`);
                }

                const data = await response.json();
                let aiText = data.choices[0].message.content;

                // [안전 필터] 한글, 숫자, 공백, 기본 문장부호 이외의 불필요 문자 정리
                aiText = aiText.replace(/[^\uAC00-\uD7AF\u1100-\u11FF\u3130-\u318F0-9\s.,!?'"~:;()\n-]/g, '');

                chatHistory.push({ role: "assistant", content: aiText });
                return aiText;
            } catch (error) {
                chatHistory.pop();
                return `<span style="font-weight:bold; color:#ffdddd;">[통신 오류]</span> DeepSeek API 연동 중 문제가 발생했습니다.<br><br><b>오류 내용:</b> ${error.message}`;
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', '나 (You)', text);
            userInput.value = '';
            userInput.style.height = 'auto'; 
            
            sendBtn.disabled = true;
            loadingIndicator.style.display = 'block';
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            const aiReply = await fetchDeepSeekReply(text);

            loadingIndicator.style.display = 'none';
            sendBtn.disabled = false;
            
            if (aiReply) {
                appendMessage(aiReply.includes('[통신 오류]') ? 'error' : 'philosopher', 
                              aiReply.includes('[통신 오류]') ? '시스템 알림' : selectedId, 
                              aiReply);
            }
            
            userInput.focus();
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
